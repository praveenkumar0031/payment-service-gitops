replicaCount: 2

image:
  repository: praveen0031/payment-service
  pullPolicy: IfNotPresent
  tag: "794d9fd205c691078b226a86708fa0d754a3f097"

service:
  type: LoadBalancer
  port: 80
  targetPort: 3000
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

ingress:
  enabled: true
  className: "alb"
  annotations:
    scheme: "internet-facing"
    targetType: "ip"  # Required for EKS Fargate or advanced routing
  paths:
    - path: /
      pathType: Prefix